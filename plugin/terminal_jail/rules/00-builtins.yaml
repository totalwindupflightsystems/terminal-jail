# terminal-jail default built-in rules
# Installed to /etc/terminal-jail/rules.d/00-builtins.yaml
# Priority 1000 = critical blocklist, 700 = auto-sandbox, 500 = always-allow
# These reflect the same 27 rules hardcoded in the Python engine.

rules:
  # =============================================================================
  # Critical Blocklist (priority 1000) — ALWAYS block, never override to allow
  # =============================================================================
  - id: "builtin-kill-all"
    description: "Mass process kill"
    priority: 1000
    action: block
    block_message: "Mass process kill (kill -9 -1) is blocked."
    match:
      type: pattern
      pattern: "kill\\s+-9\\s+-1"

  - id: "builtin-fork-bomb"
    description: "Fork bomb pattern"
    priority: 1000
    action: block
    block_message: "Fork bomb pattern detected and blocked."
    match:
      type: pattern
      pattern: ":\\s*\\(\\)\\s*\\{.*:\\|:&\\s*\\}"

  - id: "builtin-rm-rf-root"
    description: "Recursive root filesystem removal"
    priority: 1000
    action: block
    block_message: "Recursive root directory removal (rm -rf /) is blocked."
    match:
      type: pattern
      pattern: "rm\\s+(-{1,2})?\\s*-?rf\\s+/"

  - id: "builtin-dd-root"
    description: "Raw device write via dd"
    priority: 1000
    action: block
    block_message: "Raw device writes (dd to /dev/*) are blocked."
    match:
      type: pattern
      pattern: "dd\\s+.*of=/dev/"

  - id: "builtin-mkfs"
    description: "Filesystem creation"
    priority: 1000
    action: block
    block_message: "Filesystem creation commands (mkfs.*) are blocked."
    match:
      type: pattern
      pattern: "mkfs\\."

  - id: "builtin-fdisk"
    description: "Partition manipulation"
    priority: 1000
    action: block
    block_message: "Partition manipulation (fdisk, parted, gdisk) is blocked."
    match:
      type: pattern
      pattern: "fdisk|parted|gdisk"

  - id: "builtin-chmod-777-root"
    description: "World-writable root"
    priority: 1000
    action: block
    block_message: "Setting world-writable permissions on root (/) is blocked."
    match:
      type: pattern
      pattern: "chmod\\s+777\\s+/"

  - id: "builtin-echo-to-system"
    description: "Redirect output to system paths"
    priority: 1000
    action: block
    block_message: "Writing to system paths (/etc/, /boot/) is blocked."
    match:
      type: pattern
      pattern: ">\\s*/etc/|>>\\s*/etc/|>\\s*/boot/|>>\\s*/boot/"

  - id: "builtin-curl-pipe-shell"
    description: "Curl/wget piping to shell"
    priority: 1000
    action: block
    block_message: "Piping downloads directly to a shell is blocked. Use package managers instead."
    match:
      type: pattern
      pattern: "(curl|wget)\\b.*\\|\\s*(bash|sh|dash|zsh)"

  - id: "builtin-sudo"
    description: "Privilege escalation via sudo"
    priority: 1000
    action: block
    block_message: "Privilege escalation (sudo) is blocked in the sandbox."
    match:
      type: pattern
      pattern: "\\bsudo\\s"

  # =============================================================================
  # Auto-Sandbox (priority 700) — wrap in unshare namespace, never block
  # =============================================================================
  - id: "auto-pytest"
    description: "Python test runner"
    priority: 700
    action: sandbox
    block_message: "Auto-sandboxed: pytest running in isolated namespace."
    match:
      type: pattern
      pattern: "pytest|tox|nose"

  - id: "auto-npm-test"
    description: "JavaScript test runner"
    priority: 700
    action: sandbox
    block_message: "Auto-sandboxed: JS test runner in isolated namespace."
    match:
      type: pattern
      pattern: "npm\\s+test|npx\\s+(vitest|jest)"

  - id: "auto-go-test"
    description: "Go test runner"
    priority: 700
    action: sandbox
    block_message: "Auto-sandboxed: Go test runner in isolated namespace."
    match:
      type: pattern
      pattern: "go\\s+test"

  - id: "auto-make"
    description: "Build system"
    priority: 700
    action: sandbox
    block_message: "Auto-sandboxed: build tool in isolated namespace."
    match:
      type: pattern
      pattern: "make\\s|make$"

  - id: "auto-pip"
    description: "Package installer"
    priority: 700
    action: sandbox
    block_message: "Auto-sandboxed: package installer in isolated namespace."
    match:
      type: pattern
      pattern: "pip\\s+install|pip3\\s+install"

  - id: "auto-cargo"
    description: "Rust build tool"
    priority: 700
    action: sandbox
    block_message: "Auto-sandboxed: Rust build in isolated namespace."
    match:
      type: pattern
      pattern: "cargo\\s+(build|test)"

  - id: "auto-gcc"
    description: "C/C++ compilation"
    priority: 700
    action: sandbox
    block_message: "Auto-sandboxed: compilation in isolated namespace."
    match:
      type: pattern
      pattern: "gcc\\s|g\\+\\+\\s|clang\\+\\+\\s"

  - id: "auto-script"
    description: "Script execution"
    priority: 700
    action: sandbox
    block_message: "Auto-sandboxed: script execution in isolated namespace."
    match:
      type: pattern
      pattern: "\\.(sh|py|rb)\\s"

  # =============================================================================
  # Always-Allow (priority 500) — never block, never sandbox
  # =============================================================================
  - id: "allow-echo"
    description: "Safe text output"
    priority: 500
    action: allow
    match:
      type: pattern
      pattern: "^echo\\s"

  - id: "allow-ls"
    description: "Directory listing"
    priority: 500
    action: allow
    match:
      type: pattern
      pattern: "ls\\s"

  - id: "allow-pwd"
    description: "Print working directory"
    priority: 500
    action: allow
    match:
      type: pattern
      pattern: "^pwd$"

  - id: "allow-cat-safe"
    description: "Safe file reads (non-sensitive paths)"
    priority: 500
    action: allow
    match:
      type: pattern
      pattern: "^cat\\s(?!.*/(etc|boot|proc|sys))"

  - id: "allow-grep"
    description: "Text search"
    priority: 500
    action: allow
    match:
      type: pattern
      pattern: "^grep\\s"

  - id: "allow-find-safe"
    description: "File search without -exec/-delete"
    priority: 500
    action: allow
    match:
      type: pattern
      pattern: "^find\\s(?!.*-exec)(?!.*-delete)"

  - id: "allow-git-read"
    description: "Git read operations"
    priority: 500
    action: allow
    match:
      type: pattern
      pattern: "^git\\s+(status|log|diff)\\b"

  - id: "allow-python-version"
    description: "Python version check"
    priority: 500
    action: allow
    match:
      type: pattern
      pattern: "^python.*--version"

  - id: "allow-which"
    description: "Path resolution"
    priority: 500
    action: allow
    match:
      type: pattern
      pattern: "^(which|command\\s+-v)\\s"

  - id: "allow-cd"
    description: "Directory change"
    priority: 500
    action: allow
    match:
      type: pattern
      pattern: "^cd\\s"
