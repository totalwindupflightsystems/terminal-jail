# /etc/systemd/system/hermes-gateway.service.d/90-terminal-jail-hardening.conf
# Defense-in-depth for terminal-jail / Hermes gateway.
# Gradual deployment: safe directives active, dangerous ones commented with rationale.
# Review and uncomment directives one at a time after verification.

[Service]
# === SAFE — active ===
# Namespace and process-visibility containment
ProtectProc=invisible

# Privilege containment
NoNewPrivileges=true

# Protect the host cgroup hierarchy from a compromised descendant.
ProtectControlGroups=true

# Bound an agent loop or fork bomb before it can exhaust the host.
TasksMax=256

# === GRADUAL — commented, needs verification ===
# PrivateUsers=true
#   Risk: changes UID mapping. Verify gateway still accesses /home/kara/.hermes after.

# RestrictNamespaces=true
#   Risk: prevents creating new PID namespaces, which is the GOAL of terminal-jail.
#   But the gateway itself may need userns for plugin sandboxing. Test first.

# CapabilityBoundingSet=
#   Risk: empty cap set. Gateway may need CAP_SYS_ADMIN or others.

# === DANGEROUS — commented with rationale ===
# RestrictAddressFamilies=~AF_INET AF_INET6 AF_NETLINK
#   FATAL: Gateway needs TCP/IP for API calls (OpenRouter, DeepSeek, etc.)
#   and Telegram bot API. Cannot restrict AF_INET/AF_INET6.
#   Consider RestrictAddressFamilies=AF_UNIX AF_INET AF_INET6 AF_NETLINK instead.

# ProtectSystem=strict
# ProtectHome=true
#   FATAL: Gateway config and state live under /home/kara/.hermes/.
#   ProtectHome=true blocks all of /home. ProtectSystem=strict makes /usr read-only
#   which is fine but combined with ProtectHome blocks gateway operation.
#   ReadWritePaths points to non-existent directories (/var/lib/hermes etc.).

# ReadWritePaths=/var/lib/hermes
# ReadWritePaths=/var/log/hermes
# ReadWritePaths=/var/lib/terminal-jail
#   These directories don't exist. Gateway uses /home/kara/.hermes/ for state.
#   Create directories first or update paths.

# MemoryMax=1G
#   FATAL: Gateway RSS is 1.5GB+. MemoryMax=1G would OOM-kill on restart.
#   Current gateway configuration uses MemoryMax=32G, MemoryHigh=24G.
#   Do NOT override — use the gateway's own memory limits.
